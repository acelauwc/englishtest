<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Test Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#08080f;color:#e2e8f0;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(56,189,248,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(56,189,248,.025) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}
.wrap{position:relative;z-index:1;width:100%;max-width:420px;text-align:center}
.badge{display:inline-block;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:3px;border:1px solid #38bdf8;color:#38bdf8;padding:3px 14px;border-radius:2px;margin-bottom:20px;text-transform:uppercase}
h1{font-family:'Space Mono',monospace;font-size:clamp(24px,6vw,38px);font-weight:700;color:#fff;margin-bottom:10px}
h1 span{color:#38bdf8}
.sub{font-size:14px;color:#64748b;margin-bottom:36px;line-height:1.6}
.card{background:#111827;border:1px solid #1e2433;border-radius:16px;padding:36px 28px}
.card h2{font-family:'Space Mono',monospace;font-size:16px;color:#fff;margin-bottom:8px}
.card p{font-size:13px;color:#64748b;margin-bottom:24px;line-height:1.65}
input.name-inp{width:100%;background:#0d1117;border:1px solid #1e2433;border-radius:10px;color:#e2e8f0;font-family:'DM Sans',sans-serif;font-size:16px;padding:14px 18px;outline:none;margin-bottom:10px;transition:border-color .2s;-webkit-appearance:none}
input.name-inp:focus{border-color:#38bdf8}
.btn-go{width:100%;font-family:'Space Mono',monospace;font-size:13px;font-weight:700;letter-spacing:1px;padding:15px;background:linear-gradient(135deg,#7c3aed,#38bdf8);color:#fff;border:none;border-radius:10px;cursor:pointer;text-transform:uppercase;transition:opacity .2s;margin-bottom:8px}
.btn-go:hover{opacity:.88}
.err{color:#f87171;font-size:12px;font-family:'Space Mono',monospace;display:none;margin-bottom:8px}
.preview{display:none;margin-bottom:14px;padding:11px 16px;border-radius:8px;font-size:13px;font-family:'Space Mono',monospace;border:1px solid #1e2433;text-align:left}
.preview.show{display:block}
.hint{font-size:11px;color:#334155;margin-top:14px;font-family:'Space Mono',monospace}
</style>
</head>
<body>
<div class="wrap">
  <div class="badge">English Assessment Portal</div>
  <h1>Start Your <span>Test</span></h1>
  <p class="sub">Enter your name to begin.</p>
  <div class="card">
    <h2>Who are you?</h2>
    <p>Type your name and press <strong>Go</strong>. Your personalised test loads instantly.</p>
    <div class="preview" id="preview"></div>
    <div class="err" id="err">Name not recognised. Please check with your teacher.</div>
    <input class="name-inp" id="nameInp" placeholder="Your name..." maxlength="40" autocomplete="name">
    <button class="btn-go" onclick="go()">Go &rarr;</button>
    <div class="hint">ZenV &nbsp;·&nbsp; ZenZ &nbsp;·&nbsp; ZenE</div>
  </div>
</div>
<script>
const STUDENTS = {
  zenv:{name:"ZenV",level:"Secondary 2",colour:"#34d399"},
  zenz:{name:"ZenZ",level:"Secondary 1",colour:"#60a5fa"},
  zene:{name:"ZenE",level:"Primary 6",colour:"#f97316"}
};
const TEST = "./test.html"; // Change this each day

function match(val){
  const k = val.trim().toLowerCase().replace(/\s+/g,"");
  for(const [id,s] of Object.entries(STUDENTS))
    if(k===id||k.includes(id)) return s;
  return null;
}

const inp = document.getElementById("nameInp");
const preview = document.getElementById("preview");
const err = document.getElementById("err");

inp.addEventListener("input",()=>{
  err.style.display="none";
  const s = match(inp.value);
  if(s && inp.value.trim().length>=3){
    preview.className="preview show";
    preview.style.cssText=`display:block;border-color:${s.colour};color:${s.colour}`;
    preview.textContent=`👋 ${s.name} — ${s.level}`;
  } else {
    preview.className="preview";
  }
});

inp.addEventListener("keydown",e=>{ if(e.key==="Enter") go(); });

function go(){
  const s = match(inp.value);
  if(!s){ err.style.display="block"; return; }
  window.location.href = TEST+"?name="+encodeURIComponent(s.name);
}
</script>
</body>
</html>
