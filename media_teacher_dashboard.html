<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Dashboard — Environment & Climate Change</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060d08;--surf:#0b1410;--card:#111c14;--border:#1a2d1e;
  --accent:#34d399;--a2:#f97316;--a3:#60a5fa;--a4:#e879f9;
  --text:#e2e8f0;--muted:#64748b;
  --ok:#34d399;--err:#f87171;--warn:#fbbf24;
  --mono:"Space Mono",monospace;--sans:"DM Sans",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}
body::before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(52,211,153,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(52,211,153,.02) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:28px 16px 80px}

/* NAV TABS */
.nav-tabs{display:flex;gap:4px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:4px;margin-bottom:28px;flex-wrap:wrap}
.nav-tab{flex:1;min-width:120px;font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:1px;padding:9px 14px;background:transparent;color:var(--muted);border:none;border-radius:7px;cursor:pointer;text-transform:uppercase;transition:all .2s;text-align:center}
.nav-tab.active{background:var(--accent);color:#000}
.nav-tab:hover:not(.active){color:var(--text);background:rgba(52,211,153,.08)}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* HEADER */
.hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;padding-bottom:22px;border-bottom:1px solid var(--border);margin-bottom:24px;flex-wrap:wrap}
.badge{display:inline-block;font-family:var(--mono);font-size:10px;letter-spacing:3px;border:1px solid var(--a2);color:var(--a2);padding:3px 12px;border-radius:2px;margin-bottom:10px;text-transform:uppercase}
.hdr h1{font-family:var(--mono);font-size:clamp(16px,3vw,26px);font-weight:700;color:#fff}
.hdr h1 span{color:var(--accent)}
.hdr-meta{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:4px}
.hdr-btns{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.btn{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:1px;padding:8px 16px;border:none;border-radius:6px;cursor:pointer;text-transform:uppercase;transition:all .2s}
.btn-refresh{background:transparent;color:var(--accent);border:1px solid var(--accent)}
.btn-csv{background:var(--accent);color:#000}
.btn-danger{background:transparent;color:var(--err);border:1px solid rgba(248,113,113,.3);font-size:10px}

/* STAT CARDS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;border-top:2px solid var(--accent)}
.stat.s2{border-top-color:var(--a2)}.stat.s3{border-top-color:var(--ok)}.stat.s4{border-top-color:var(--warn)}
.stat .v{font-family:var(--mono);font-size:26px;font-weight:700;color:var(--text)}
.stat .l{font-size:10px;color:var(--muted);margin-top:5px;text-transform:uppercase;letter-spacing:1px;font-family:var(--mono)}

/* TOOLBAR */
.toolbar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.toolbar input,.toolbar select{background:var(--card);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--mono);font-size:11px;padding:8px 12px;outline:none;cursor:pointer}
.toolbar input{font-family:var(--sans);font-size:13px;flex:1;min-width:180px;max-width:260px}
.toolbar input:focus{border-color:var(--accent)}

/* TABLE */
.tbl-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.tbl-head{display:grid;grid-template-columns:2fr 1.1fr 0.9fr 0.5fr 0.5fr 0.5fr 0.5fr 0.5fr 0.5fr 0.5fr 0.5fr 0.5fr 0.6fr;background:var(--surf);border-bottom:1px solid var(--border)}
.th{padding:10px 12px;font-family:var(--mono);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.tbl-row{display:grid;grid-template-columns:2fr 1.1fr 0.9fr 0.5fr 0.5fr 0.5fr 0.5fr 0.5fr 0.5fr 0.5fr 0.5fr 0.5fr 0.6fr;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.tbl-row:last-child{border-bottom:none}
.tbl-row:hover{background:rgba(52,211,153,.04)}
.td{padding:12px 12px;display:flex;align-items:center;font-size:12px}
.td.name-td{gap:10px;font-weight:600;font-size:13px;color:#fff}
.avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--a2),var(--accent));display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;font-weight:700;color:#000;flex-shrink:0}
.td.score-td{flex-direction:column;align-items:flex-start;gap:3px}
.mini-bar{width:100%;height:3px;background:var(--border);border-radius:2px}
.mini-fill{height:100%;border-radius:2px}
.sec-sc{font-family:var(--mono);font-size:12px;font-weight:700}
.btn-view{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:1px;padding:4px 10px;background:transparent;border:1px solid var(--a3);color:var(--a3);border-radius:4px;cursor:pointer;text-transform:uppercase}
.empty{text-align:center;padding:60px 20px}
.empty .icon{font-size:40px;margin-bottom:14px}
.empty h3{font-family:var(--mono);font-size:15px;color:var(--muted);margin-bottom:6px}
.empty p{font-size:13px;color:var(--muted)}

/* STUDENT PROFILE */
.profile-header{display:flex;align-items:flex-start;gap:18px;margin-bottom:24px;flex-wrap:wrap}
.profile-avatar{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--a2),var(--accent));display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:18px;font-weight:700;color:#000;flex-shrink:0}
.profile-name{font-family:var(--mono);font-size:20px;color:#fff;margin-bottom:4px}
.profile-meta{font-size:12px;color:var(--muted);font-family:var(--mono)}

/* PROFILE TABS */
.profile-tabs{display:flex;gap:4px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:3px;margin-bottom:20px}
.profile-tab{flex:1;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:1px;padding:8px;background:transparent;color:var(--muted);border:none;border-radius:5px;cursor:pointer;text-transform:uppercase;text-align:center;transition:all .2s}
.profile-tab.active{background:var(--surf);color:var(--accent);border:1px solid var(--border)}

/* OVERVIEW CARDS */
.ov-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.ov-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;text-align:center}
.ov-card .v{font-family:var(--mono);font-size:22px;font-weight:700}
.ov-card .l{font-size:10px;color:var(--muted);font-family:var(--mono);margin-top:3px}

/* SECTION BARS */
.sec-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.sec-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 14px}
.sec-card .sl{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.sec-card .sv{font-family:var(--mono);font-size:18px;font-weight:700}
.sec-card .sb{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:6px}
.sec-card .sf{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--a2),var(--accent))}

/* TEST HISTORY */
.history-list{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.history-item{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.history-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;cursor:pointer;gap:12px;flex-wrap:wrap}
.history-date{font-family:var(--mono);font-size:11px;color:var(--accent);letter-spacing:1px}
.history-theme{font-size:13px;font-weight:600;color:#fff}
.history-score{font-family:var(--mono);font-size:14px;font-weight:700}
.history-body{padding:14px 18px;border-top:1px solid var(--border);display:none}
.history-body.open{display:block}
.history-parts{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:12px}
.history-part{background:var(--surf);border-radius:6px;padding:8px;text-align:center}
.history-part .pv{font-family:var(--mono);font-size:14px;font-weight:700}
.history-part .pl{font-size:9px;color:var(--muted);font-family:var(--mono);margin-top:2px}

/* STRENGTH/WEAKNESS */
.sw-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.sw-card{background:var(--card);border-radius:10px;overflow:hidden}
.sw-card.strength{border:1px solid rgba(52,211,153,.3)}
.sw-card.weakness{border:1px solid rgba(248,113,113,.3)}
.sw-header{padding:12px 16px;display:flex;align-items:center;gap:8px}
.sw-header.strength{background:rgba(52,211,153,.08)}
.sw-header.weakness{background:rgba(248,113,113,.08)}
.sw-title{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.sw-title.strength{color:var(--ok)}
.sw-title.weakness{color:var(--err)}
.sw-body{padding:12px 16px}
.sw-item{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
.sw-item:last-child{border-bottom:none}
.sw-item .si-name{color:var(--text)}
.sw-item .si-score{font-family:var(--mono);font-size:11px;font-weight:700}
.sw-note{font-size:12px;color:var(--muted);line-height:1.65;padding:8px 0}

/* IMPROVEMENT TIPS */
.tips-list{display:flex;flex-direction:column;gap:8px}
.tip-item{background:var(--card);border:1px solid rgba(249,115,22,.2);border-left:3px solid var(--a2);border-radius:0 8px 8px 0;padding:12px 16px}
.tip-item .tip-label{font-family:var(--mono);font-size:10px;color:var(--a2);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.tip-item .tip-text{font-size:13px;color:var(--text);line-height:1.6}

/* CLASS SUMMARY TAB */
.class-section{margin-bottom:28px}
.class-section h3{font-family:var(--mono);font-size:11px;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.class-section h3::after{content:"";flex:1;height:1px;background:var(--border)}
.day-card{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden}
.day-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;cursor:pointer;gap:12px;flex-wrap:wrap}
.day-date{font-family:var(--mono);font-size:11px;color:var(--accent)}
.day-theme{font-size:13px;font-weight:600;color:#fff}
.day-count{font-family:var(--mono);font-size:11px;color:var(--muted)}
.day-body{display:none;border-top:1px solid var(--border)}
.day-body.open{display:block}
.day-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:16px 18px;border-bottom:1px solid var(--border)}
.day-stat{text-align:center}
.day-stat .dv{font-family:var(--mono);font-size:20px;font-weight:700}
.day-stat .dl{font-size:10px;color:var(--muted);font-family:var(--mono);margin-top:3px;text-transform:uppercase}
.day-parts{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;padding:14px 18px;border-bottom:1px solid var(--border)}
.day-part{background:var(--surf);border-radius:6px;padding:8px;text-align:center}
.day-part .dpv{font-family:var(--mono);font-size:14px;font-weight:700}
.day-part .dpl{font-size:9px;color:var(--muted);font-family:var(--mono);margin-top:2px}
.day-students{padding:14px 18px}
.day-student-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
.day-student-row:last-child{border-bottom:none}

/* ANSWER ROWS */
.ans-section{margin-bottom:20px}
.ans-section h4{font-family:var(--mono);font-size:10px;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:10px}
.ans-section h4::after{content:"";flex:1;height:1px;background:var(--border)}
.ans-row{display:grid;grid-template-columns:44px 1fr 70px;gap:8px;padding:10px 12px;border-radius:7px;margin-bottom:6px;font-size:12px;align-items:start}
.ans-row.r-ok{background:rgba(52,211,153,.04);border:1px solid rgba(52,211,153,.15)}
.ans-row.r-bad{background:rgba(248,113,113,.04);border:1px solid rgba(248,113,113,.15)}
.ans-row.r-open{background:rgba(96,165,250,.04);border:1px solid rgba(96,165,250,.15)}
.ans-row.r-blank{background:rgba(255,255,255,.02);border:1px solid var(--border)}
.ans-qn{font-family:var(--mono);font-size:10px;color:var(--muted);padding-top:2px}
.ans-given{color:var(--text);line-height:1.55;word-break:break-word}
.ans-model{color:var(--a2);font-size:11px;margin-top:4px;line-height:1.5}
.ans-rule{color:var(--a3);font-size:11px;margin-top:3px;line-height:1.5}
.ans-status{font-family:var(--mono);font-size:12px;font-weight:700;text-align:right;padding-top:2px}
.para-box{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;font-size:13px;line-height:1.85;color:var(--text);white-space:pre-wrap;margin-bottom:8px}
.back-btn{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:1px;padding:8px 16px;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:6px;cursor:pointer;text-transform:uppercase;margin-bottom:20px}

@media(max-width:700px){
  .stats{grid-template-columns:1fr 1fr}
  .tbl-head,.tbl-row{grid-template-columns:2fr 0.9fr 0.7fr 0.6fr}
  .th:nth-child(n+5),.td:nth-child(n+5):not(:last-child){display:none}
  .ov-grid,.sec-grid{grid-template-columns:1fr 1fr}
  .sw-grid{grid-template-columns:1fr}
  .day-stats{grid-template-columns:1fr 1fr}
  .history-parts,.day-parts{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>
<body>
<div class="wrap">

  <!-- HEADER -->
  <div class="hdr">
    <div>
      <div class="badge">Teacher Dashboard</div>
      <h1>Media &amp; Communication — <span>Results</span></h1>
      <div class="hdr-meta" id="metaTxt">Loading...</div>
    </div>
    <div class="hdr-btns">
      <button class="btn btn-refresh" onclick="loadData()">&#8635; Refresh</button>
      <button class="btn btn-csv" onclick="exportCSV()">&#8595; CSV</button>
      <button class="btn btn-danger" onclick="confirmReset()">&#128465; Clear All</button>
    </div>
  </div>

  <!-- NAV TABS -->
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchTab('submissions')">&#128101; Submissions</button>
    <button class="nav-tab" onclick="switchTab('classview')">&#128197; Day-by-Day</button>
    <button class="nav-tab" onclick="switchTab('classweakness')">&#128202; Class Weakness</button>
  </div>

  <!-- ═══ TAB 1: SUBMISSIONS ═══ -->
  <div class="tab-panel active" id="tab-submissions">
    <div class="stats">
      <div class="stat"><div class="v" id="stTotal">0</div><div class="l">Submissions</div></div>
      <div class="stat s2"><div class="v" id="stAvg">—</div><div class="l">Class Average</div></div>
      <div class="stat s3"><div class="v" id="stHigh">—</div><div class="l">Highest Score</div></div>
      <div class="stat s4"><div class="v" id="stPass">—</div><div class="l">Pass Rate ≥60%</div></div>
    </div>
    <div class="toolbar">
      <input type="text" id="searchInput" placeholder="🔍 Search by name..." oninput="renderTable()">
      <select id="levelFilter" onchange="renderTable()">
        <option value="">All Levels</option>
        <option value="S2">ZenV — Sec 2</option>
        <option value="S1">ZenZ — Sec 1</option>
        <option value="P6">ZenE — Pri 6</option>
      </select>
      <select id="sortSel" onchange="renderTable()">
        <option value="time">Latest First</option>
        <option value="score-desc">Highest Score</option>
        <option value="score-asc">Lowest Score</option>
        <option value="name">Name A–Z</option>
      </select>
    </div>
    <div class="tbl-wrap" id="tblWrap"></div>
  </div>

  <!-- ═══ TAB 2: DAY-BY-DAY ═══ -->
  <div class="tab-panel" id="tab-classview">
    <div class="class-section">
      <h3>Test Sessions by Date</h3>
      <div id="dayList"></div>
    </div>
  </div>

  <!-- ═══ TAB 3: CLASS WEAKNESS ═══ -->
  <div class="tab-panel" id="tab-classweakness">
    <div class="class-section">
      <h3>Overall Class Performance by Section</h3>
      <div class="sec-grid" id="classSecGrid"></div>
    </div>
    <div class="class-section">
      <h3>Areas Needing Improvement</h3>
      <div class="sw-grid" id="classSwGrid"></div>
    </div>
    <div class="class-section">
      <h3>Recommended Focus Areas</h3>
      <div class="tips-list" id="classTips"></div>
    </div>
  </div>

  <!-- ═══ STUDENT DETAIL VIEW ═══ -->
  <div id="detailView" style="display:none">
    <button class="back-btn" onclick="closeDetail()">&#8592; Back to Dashboard</button>
    <div class="profile-header">
      <div class="profile-avatar" id="detAvatar"></div>
      <div>
        <div class="profile-name" id="detName"></div>
        <div class="profile-meta" id="detMeta"></div>
      </div>
    </div>
    <div class="profile-tabs">
      <button class="profile-tab active" onclick="switchProfileTab('overview')">Overview</button>
      <button class="profile-tab" onclick="switchProfileTab('history')">Test History</button>
      <button class="profile-tab" onclick="switchProfileTab('analysis')">Strength / Weakness</button>
      <button class="profile-tab" onclick="switchProfileTab('answers')">Full Answers</button>
    </div>
    <div id="profile-overview" class="profile-panel"></div>
    <div id="profile-history" class="profile-panel" style="display:none"></div>
    <div id="profile-analysis" class="profile-panel" style="display:none"></div>
    <div id="profile-answers" class="profile-panel" style="display:none"></div>
  </div>

</div>

  a:"Focus on tense signals (last year = past simple; since = present perfect; by the time = past perfect). Practice identifying which tense each time expression requires.",
  b:"Study word families: noun → verb → adjective → adverb patterns. Learn common suffixes: -tion/-ation (noun), -ive/-ful (adj), -ly (adverb).",
  c:"Review subject-verb agreement rules, especially for 'the number of', 'along with', and 'neither...nor'. Also practise modal perfect structures (should have, could have).",
  d:"Practise passive voice formation, reported speech tense shifts, and connective structures (so...that, despite, although, having + past participle).",
  e:"Focus on sentence structure: subject + verb + object order. Practise identifying passive constructions and correct word order in complex sentences.",

function levelColour(grade){
  if(!grade) return "var(--a2)";
  if(grade==="S2") return "#34d399";
  if(grade==="S1") return "#60a5fa";
  if(grade==="P6") return "#f97316";
  return "var(--a2)";
}
function norm(s){return(s||"").toLowerCase().replace(/[^a-z0-9 ',]/g,"").replace(/\s+/g," ").trim()}
function sc(pct){return pct>=80?"#34d399":pct>=60?"#fbbf24":"#f87171"}
function initials(name){return(name||"?").split(" ").map(w=>w[0]).slice(0,2).join("").toUpperCase()}
function fmtDate(str){try{const d=new Date(str);return isNaN(d)?str:d.toLocaleDateString("en-MY",{day:"numeric",month:"short",year:"numeric"});}catch(e){return str;}}

let allSubs=[], currentStudent=null;

// ── LOAD ─────────────────────────────────────────────────────────────────────
async function loadData(){
  document.getElementById("metaTxt").textContent="Refreshing...";
  // Retry up to 3 times with backoff
  for(let attempt=1; attempt<=3; attempt++){
    try{
      const res=await fetch(`${API}/b/${BIN_ID}/latest`,{
        headers:{"X-Master-Key":MASTER_KEY,"X-Bin-Meta":"false"},
        cache:"no-store"  // Always get fresh data, never cached
      });
      if(!res.ok) throw new Error("HTTP "+res.status);
      const data=await res.json();
      const rawSubs=Array.isArray(data.submissions)?data.submissions:[];
      // Deduplicate — keep only the most recent entry per student+theme
      const seen={};
      allSubs=[];
      [...rawSubs].reverse().forEach(s=>{
        const key=(s.name||"")+"__"+(s.testTheme||"");
        if(!seen[key]){seen[key]=true;allSubs.push(s);}
      });
      allSubs.reverse();
      renderAll();
      const finals=allSubs;
      
      const now=new Date().toLocaleTimeString("en-MY",{hour:"2-digit",minute:"2-digit"});
      document.getElementById("metaTxt").textContent=`Refreshed ${now} · ${finals.length} submitted · ${drafts.length} in progress`;
      return; // Success — stop retrying
    }catch(e){
      console.warn("Load attempt "+attempt+" failed:",e.message);
      if(attempt<3) await new Promise(r=>setTimeout(r,1500*attempt));
      else document.getElementById("metaTxt").textContent=`Load failed — retrying in 30s (${e.message})`;
    }
  }
}

function renderAll(){
  renderStats();
  renderTable();
  renderDayByDay();
  renderClassWeakness();
}

// ── SCORE STUDENT ─────────────────────────────────────────────────────────────
function scoreStudent(sub){
  // Prefer stored sectionScores (supports randomized papers from test.html)
  if(sub.sectionScores && typeof sub.sectionScores === "object"){
    return {
      a:Number(sub.sectionScores.a)||0,
      b:Number(sub.sectionScores.b)||0,
      c:Number(sub.sectionScores.c)||0,
      d:Number(sub.sectionScores.d)||0,
      e:Number(sub.sectionScores.e)||0,
      f:Number(sub.sectionScores.f)||0
    };
  }

  const theme=sub.testTheme||"Media & Communication";
  const AK=ANSWERS_BY_THEME[theme]||ANSWERS_BY_THEME["Media & Communication"];
  const grade=sub.studentGrade||"ZenV";
  const ans=sub.answers||{};
  const ss={};
  ["a","b","c","d","e"].forEach(p=>{
    let s=0;
    const levelAnswers = AK[p] && AK[p][grade] ? AK[p][grade] : (Array.isArray(AK[p]) ? AK[p] : []);
    for(let i=1;i<=10;i++){
      const given=(ans[p+i]||"").trim();
      const expected=(levelAnswers[i-1]||"").trim();
      if(given.length>0 && norm(given)===norm(expected))s++;
    }
    ss[p]=s;
  });

  let sf=0;
  const fAnswers = AK.f && AK.f[grade] ? AK.f[grade] : (Array.isArray(AK.f) ? AK.f : []);
  for(let i=1;i<=10;i++){
    const fv = ans["f"+i];
    if(fv !== "" && fv !== undefined && Number(fv)===Number(fAnswers[i-1])) sf++;
  }
  ss.f=sf;
  return ss;
}

// ── STATS ─────────────────────────────────────────────────────────────────────
function renderStats(){
  const finals=allSubs;
  const n=finals.length;
  document.getElementById("stTotal").textContent=n;
  if(!n){["stAvg","stHigh","stPass"].forEach(id=>document.getElementById(id).textContent="—");return;}
  const scores=finals.map(s=>{
    const ss=scoreStudent(s);
    return Object.values(ss).reduce((a,b)=>a+b,0);
  });
  document.getElementById("stAvg").textContent=Math.round(scores.reduce((a,b)=>a+b,0)/n)+"/60";
  document.getElementById("stHigh").textContent=Math.max(...scores)+"/60";
  document.getElementById("stPass").textContent=Math.round((scores.filter(s=>s>=36).length/n)*100)+"%";
}

// ── SHOW STUDENT DETAIL ───────────────────────────────────────────────────────
function showDetail(name){
  // Get all submissions for this student
  const studentSubs=allSubs.filter(s=>s.name===name);
  if(!studentSubs.length)return;
  currentStudent=name;

  // Hide main, show detail
  document.querySelectorAll(".tab-panel").forEach(el=>el.style.display="none");
  document.querySelector(".nav-tabs").style.display="none";
  document.getElementById("detailView").style.display="block";

  const latest=studentSubs[studentSubs.length-1];
  const init=initials(name);
  document.getElementById("detAvatar").textContent=init;
  const lc = levelColour(latest.studentGrade);
  document.getElementById("detAvatar").style.background=`linear-gradient(135deg,${lc},var(--accent))`;
  document.getElementById("detName").textContent=name;
  const lvl = latest.studentLevel ? ` · Level: ${latest.studentLevel}` : "";
  document.getElementById("detMeta").textContent=`${studentSubs.length} test${studentSubs.length!==1?"s":""} completed · Latest: ${latest.submittedAt||"N/A"}${lvl}`;

  // Score all submissions
  const allScored=studentSubs.map(s=>{const ss=scoreStudent(s);const score=Object.values(ss).reduce((a,b)=>a+b,0);return{...s,_ss:ss,_score:score,_pct:Math.round((score/60)*100)};});

  renderProfileOverview(allScored);
  renderProfileHistory(allScored);
  renderProfileAnalysis(allScored);
  renderProfileAnswers(allScored[allScored.length-1]);
  switchProfileTab("overview");
}

}

    <div class="ov-grid">
      <div class="ov-card"><div class="v" style="color:${sc(pct)}">${latest._score}/60</div><div class="l">Latest Score (A–F)</div></div>
      <div class="ov-card"><div class="v" style="color:${sc(Math.round(avgScore/60*100))}">${avgScore}/60</div><div class="l">Average Score</div></div>
      <div class="ov-card"><div class="v" style="color:${sc(Math.round(best/60*100))}">${best}/60</div><div class="l">Best Score</div></div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px">
      <div style="background:rgba(96,165,250,.07);border:1px solid rgba(96,165,250,.2);border-radius:8px;padding:12px;text-align:center">
        <div style="font-family:var(--mono);font-size:20px;font-weight:700;color:var(--a3)">${gAns}/10</div>
        <div style="font-size:10px;color:var(--muted);font-family:var(--mono);margin-top:3px">Part G answered</div>
      </div>
      <div style="background:rgba(96,165,250,.07);border:1px solid rgba(96,165,250,.2);border-radius:8px;padding:12px;text-align:center">
        <div style="font-family:var(--mono);font-size:20px;font-weight:700;color:var(--a3)">${hAns}/10</div>
        <div style="font-size:10px;color:var(--muted);font-family:var(--mono);margin-top:3px">Part H answered</div>
      </div>
      <div style="background:rgba(96,165,250,.07);border:1px solid rgba(96,165,250,.2);border-radius:8px;padding:12px;text-align:center">
        <div style="font-family:var(--mono);font-size:20px;font-weight:700;color:var(--a3)">${iWords}w</div>
        <div style="font-size:10px;color:var(--muted);font-family:var(--mono);margin-top:3px">Part I words</div>
      </div>
    </div>
    <div style="margin-bottom:16px;padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:space-between;font-size:13px">
      <span style="color:var(--muted)">Progress trend</span>
      <span style="font-family:var(--mono);font-size:13px">${trend}</span>
    </div>
    <div class="sec-grid">
      ${["a","b","c","d","e","f"].map(p=>{const avg=secAvg[p],pp=avg*10;return`<div class="sec-card"><div class="sl">${SECTION_NAMES[p]}</div><div class="sv" style="color:${sc(pp)}">${avg.toFixed(1)}/10</div><div class="sb"><div class="sf" style="width:${pp}%"></div></div></div>`;}).join("")}
    </div>`;
}

function renderProfileHistory(allScored){
  document.getElementById("profile-history").innerHTML=`
    <div class="history-list">
      ${allScored.map((s,i)=>`
        <div class="history-item">
          <div class="history-header" onclick="toggleHistory('hist-${i}')">
            <div>
              <div class="history-date">${s.submittedAt||"—"}</div>
              <div class="history-theme">${s.testTheme||"Environment & Climate Change"}</div>
            </div>
            <div style="display:flex;align-items:center;gap:12px">
              <span class="history-score" style="color:${sc(s._pct)}">${s._score}/60 (${s._pct}%)</span>
              <span style="color:var(--muted);font-size:12px">▾</span>
            </div>
          </div>
          <div class="history-body" id="hist-${i}">
            <div class="history-parts">
              ${["a","b","c","d","e","f"].map(p=>`<div class="history-part"><div class="pv" style="color:${sc((s._ss[p]||0)*10)}">${s._ss[p]||0}/10</div><div class="pl">Part ${p.toUpperCase()}</div></div>`).join("")}
            </div>
            <div style="font-size:12px;color:var(--muted);padding:4px 0">Duration: ${s.duration||"N/A"}</div>
          </div>
        </div>`).join("")}
    </div>`;
}

function renderProfileAnalysis(allScored){
  const secAvg={};
  ["a","b","c","d","e","f"].forEach(p=>{secAvg[p]=allScored.reduce((a,s)=>a+(s._ss[p]||0),0)/allScored.length;});
  const sorted=[...["a","b","c","d","e","f"]].sort((a,b)=>secAvg[a]-secAvg[b]);
  const weak=sorted.slice(0,3);
  const strong=sorted.slice(-3).reverse();

  document.getElementById("profile-analysis").innerHTML=`
    <div class="sw-grid">
      <div class="sw-card strength">
        <div class="sw-header strength"><span style="font-size:16px">&#9989;</span><span class="sw-title strength">Strengths</span></div>
        <div class="sw-body">${strong.map(p=>`<div class="sw-item"><span class="si-name">${SECTION_NAMES[p]}</span><span class="si-score" style="color:${sc(secAvg[p]*10)}">${secAvg[p].toFixed(1)}/10</span></div>`).join("")}</div>
      </div>
      <div class="sw-card weakness">
        <div class="sw-header weakness"><span style="font-size:16px">&#9888;&#65039;</span><span class="sw-title weakness">Needs Improvement</span></div>
        <div class="sw-body">${weak.map(p=>`<div class="sw-item"><span class="si-name">${SECTION_NAMES[p]}</span><span class="si-score" style="color:${sc(secAvg[p]*10)}">${secAvg[p].toFixed(1)}/10</span></div>`).join("")}</div>
      </div>
    </div>
    <div class="tips-list">
      ${weak.map(p=>`<div class="tip-item"><div class="tip-label">&#128270; Recommended focus: ${SECTION_NAMES[p]}</div><div class="tip-text">${SECTION_TIPS[p]}</div></div>`).join("")}
    </div>`;
}

function renderProfileAnswers(s){
  const theme=s.testTheme||"Environment & Climate Change";
  const AK=ANSWERS_BY_THEME[theme]||ANSWERS_BY_THEME["Environment & Climate Change"];
  const ans=s.answers||{};

  const AnsRows=(pfx,modelAns)=>Array.from({length:10},(_,i)=>{
    const k=pfx+(i+1),given=ans[k]||"",model=(modelAns||[])[i]||"";
    const ok=model&&norm(given)===norm(model);
    const cls=!given?"r-blank":ok?"r-ok":"r-bad";
    return `<div class="ans-row ${cls}">
      <div class="ans-qn">Q${i+1}</div>
      <div><div class="ans-given">${given||"<em style='color:var(--muted)'>No answer</em>"}</div>${!ok&&given&&model?`<div class="ans-model">&#10003; ${model}</div>`:""}
      </div>
      <div class="ans-status" style="color:${!given?"var(--muted)":ok?"var(--ok)":"var(--err)"}">${!given?"—":ok?"✓":"✗"}</div>
    </div>`;
  }).join("");

  const McqRows=()=>Array.from({length:10},(_,i)=>{
    const k="f"+(i+1),given=ans[k]||"",correct=AK.f[i];
    const ok=given===correct;
    const opts=AK.fOpts[i]||[];
    const letters=["A","B","C","D"];
    const cls=!given?"r-blank":ok?"r-ok":"r-bad";
    return `<div class="ans-row ${cls}">
      <div class="ans-qn">Q${i+1}</div>
      <div><div class="ans-given">${given?`${given}. ${opts[letters.indexOf(given)]||""}`:""||"<em style='color:var(--muted)'>No answer</em>"}</div>
      ${!ok&&given?`<div class="ans-model">&#10003; ${correct}. ${opts[letters.indexOf(correct)]||""}</div><div class="ans-rule">${AK.fRules[i]||""}</div>`:""}
      </div>
      <div class="ans-status" style="color:${!given?"var(--muted)":ok?"var(--ok)":"var(--err)"}">${!given?"—":ok?"✓":"✗"}</div>
    </div>`;
  }).join("");

  document.getElementById("profile-answers").innerHTML=`
    ${[["a","Part A — Verb Forms",AK.a],["b","Part B — Word Forms",AK.b],["c","Part C — Error Correction",AK.c],["d","Part D — Transformation",AK.d],["e","Part E — Sentence Building",AK.e]].map(([p,t,ma])=>`
      <div class="ans-section"><h4>${t}</h4>${AnsRows(p,ma)}</div>`).join("")}
    <div class="ans-section"><h4>Part F — Vocabulary MCQ</h4>${McqRows()}</div>
    ${[["g","Part G — Sentence Expansion"],["h","Part H — Composition Practice"]].map(([p,t])=>`
      <div class="ans-section">
      <h4>${t} <span style="font-size:10px;color:var(--a2)">(Teacher-marked — add your score below)</span>
      ${s.duplicateFlags&&s.duplicateFlags[p]?`<span style="background:rgba(248,113,113,.15);border:1px solid rgba(248,113,113,.4);color:var(--err);font-family:var(--mono);font-size:9px;padding:2px 8px;border-radius:3px;margin-left:8px">⚠ ${s.duplicateFlags[p]==="duplicate"?"IDENTICAL ANSWERS":"VERY SIMILAR ANSWERS"}</span>`:""}
      </h4>
      ${s.duplicateFlags&&s.duplicateFlags[p]?`<div style="background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.25);border-radius:8px;padding:12px 16px;margin-bottom:12px;font-size:13px;color:var(--err)">&#9888; This student submitted ${s.duplicateFlags[p]==="duplicate"?"identical":"very similar"} answers for all questions in this section. Please review carefully and consider asking the student to redo this section.</div>`:""}
      <div style="display:grid;gap:10px">
      ${Array.from({length:10},(_,i)=>{
        const given=ans[p+(i+1)]||"";
        const qLabels={g:["The iceberg melted.","Sea levels rose.","Scientists warned governments.","The coral reef died.","The flood devastated the village.","Nations disagreed at the summit.","Renewable energy expanded.","The activist protested.","Wildlife habitats disappeared.","The agreement was reached."],h:["The weather is getting worse.","Many animals are dying.","The air in the city is bad.","People wasted a lot of energy.","The government made new environment rules.","Plastic is a big problem in the ocean.","Scientists found worrying results.","Young people started caring about the environment.","Trees were cut down in the forest.","The temperature went up every year."]};
        const original = qLabels[p]?qLabels[p][i]:"";
        return`<div style="background:rgba(96,165,250,.04);border:1px solid rgba(96,165,250,.15);border-radius:8px;padding:12px 14px">
          <div style="font-family:var(--mono);font-size:10px;color:var(--muted);margin-bottom:4px">Q${i+1} — Original: <em>${original}</em></div>
          <div style="font-size:13px;color:${given?"var(--text)":"var(--muted)"};line-height:1.65">${given||"No answer provided."}</div>
        </div>`;}).join("")}
      </div></div>`).join("")}
    <div class="ans-section"><h4>Part I — Paragraph Writing <span style="font-size:10px;color:var(--a2)">(Teacher-marked — add your score below)</span></h4>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;font-size:12px;font-family:var(--mono)">
        <span style="color:var(--a2)">Topic: The Most Urgent Environmental Challenge Facing the World Today</span>
        <span style="color:${(ans.i1||"").trim().split(/\s+/).filter(w=>w).length>=80?"var(--ok)":"var(--warn)"}">Words: ${(ans.i1||"").trim().split(/\s+/).filter(w=>w).length} (target: 100–140)</span>
      </div>
      <div class="para-box">${ans.i1||"No answer provided."}</div>
    </div>`;
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function extractDate(str){
  // Try to parse "15 Jan 2025, 09:30 AM" or similar
  try{const d=new Date(str);if(!isNaN(d))return d.toLocaleDateString("en-MY",{day:"numeric",month:"short",year:"numeric"});}catch(e){}
  // Fallback: take first part before comma
  return (str||"Unknown").split(",")[0].trim()||"Unknown";
}

function switchTab(tab){
  document.querySelectorAll(".nav-tab").forEach(el=>el.classList.remove("active"));
  document.querySelectorAll(".tab-panel").forEach(el=>el.classList.remove("active"));
  document.getElementById("tab-"+tab).classList.add("active");
  event.target.classList.add("active");
}

function switchProfileTab(tab){
  document.querySelectorAll(".profile-tab").forEach(el=>el.classList.remove("active"));
  document.querySelectorAll(".profile-panel").forEach(el=>el.style.display="none");
  document.getElementById("profile-"+tab).style.display="block";
  event.target.classList.add("active");
}

function toggleDay(id){const el=document.getElementById(id);el.classList.toggle("open");}
function toggleHistory(id){const el=document.getElementById(id);el.classList.toggle("open");}

// ── EXPORT ────────────────────────────────────────────────────────────────────
function exportCSV(){
  const finals=allSubs;
  if(!finals.length){alert("No data to export.");return;}
  const scored=finals.map(s=>{const ss=scoreStudent(s);const score=Object.values(ss).reduce((a,b)=>a+b,0);return{...s,_ss:ss,_score:score,_pct:Math.round((score/60)*100)};});
  const rows=[["Name","Theme","Submitted","Duration","Score","Pct","A","B","C","D","E","F"].join(","),
    ...scored.map(s=>[s.name,s.testTheme||"",s.submittedAt,s.duration,s._score,s._pct+"%",s._ss.a,s._ss.b,s._ss.c,s._ss.d,s._ss.e,s._ss.f].map(v=>`"${v||0}"`).join(","))
  ].join("\n");
  const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([rows],{type:"text/csv"}));a.download="environment_results.csv";a.click();
}

async function confirmReset(){
  if(!confirm("Delete ALL submissions? This cannot be undone."))return;
  try{
    await fetch(`${API}/b/${BIN_ID}`,{method:"PUT",headers:{"Content-Type":"application/json","X-Master-Key":MASTER_KEY},body:JSON.stringify({submissions:[]})});
    allSubs=[];renderAll();document.getElementById("metaTxt").textContent="All submissions cleared.";
  }catch(e){alert("Could not clear. Check connection.");}
}

window.addEventListener("load",()=>{loadData();setInterval(loadData,15000);});
</script>
