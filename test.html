<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>English Test Generator (A–I)</title>
  <style>
    :root{--bg:#0b1020;--card:#121a31;--muted:#9fb0d3;--txt:#e9efff;--accent:#60a5fa;--ok:#34d399;--warn:#fbbf24;--bad:#f87171}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,Segoe UI,Arial;background:linear-gradient(180deg,#070b18,#101a35);color:var(--txt)}
    .wrap{max-width:1100px;margin:24px auto;padding:0 14px}
    .card{background:rgba(18,26,49,.92);border:1px solid rgba(159,176,211,.18);border-radius:14px;padding:16px}
    h1{font-size:22px;margin:0 0 6px} .muted{color:var(--muted);font-size:13px}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    input,textarea,select{width:100%;background:#0b1327;border:1px solid #2d3b62;border-radius:10px;color:var(--txt);padding:10px;font-size:14px}
    textarea{min-height:90px;resize:vertical}
    button{background:#2563eb;color:#fff;border:0;border-radius:10px;padding:10px 14px;cursor:pointer;font-weight:600}
    button:disabled{opacity:.6;cursor:not-allowed}
    .ghost{background:#243454}
    .pill{display:inline-block;border:1px solid #35508c;padding:4px 10px;border-radius:999px;font-size:12px;color:#bdd0ff}
    .grid{display:grid;gap:10px}
    .q{padding:10px;border:1px solid rgba(159,176,211,.2);border-radius:10px;background:#0c152b}
    .qnum{font-size:12px;color:#aac0ef;margin-bottom:6px}
    .good{border-color:rgba(52,211,153,.55)!important} .bad{border-color:rgba(248,113,113,.6)!important}
    .sec{margin-top:14px}
    .sec h2{margin:0 0 8px;font-size:16px}
    .meta{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
    .status{font-size:12px;color:#b9caef}
    .mcqOpts{display:grid;gap:6px;margin-top:6px}
    .opt{padding:8px;border:1px solid #2d3b62;border-radius:8px;cursor:pointer}
    .opt.sel{background:#1a2f5f;border-color:#4f74c6}
    .opt.right{border-color:var(--ok)} .opt.wrong{border-color:var(--bad)}
    #main{display:none}
    .scoreBox{font-weight:700}
    .fb{font-size:12px;margin-top:6px;color:#b9caef;white-space:pre-wrap}
  </style>
</head>
<body>
<div class="wrap">
  <div id="gate" class="card">
    <h1>English Test (Parts A–I)</h1>
    <div class="muted">Auto-generated by student level · A–F static answers · G–I smart checking</div>
    <div class="row" style="margin-top:12px">
      <div style="flex:1 1 240px"><input id="studentName" placeholder="Enter student name (ZenV / ZenZ / ZenE)" /></div>
      <button onclick="startTest()">Start Test</button>

    <div class="meta">
      <span class="pill" id="answeredTag">Answered: 0/71</span>
      <span class="pill" id="savedTag">Not saved yet</span>
    </div>

    <div id="sections"></div>
  </div>
</div>

  if(!k) return null;
  return PROFILES[k]||Object.values(PROFILES).find(p=>k.includes(p.name.toLowerCase()))||null;
}

function generateSet(levelKey, bankOverride){
  const src = bankOverride || BANK;
  const b=src[levelKey]||src.zenv;
  return {
    a:pick(b.a,10), b:pick(b.b,10), c:pick(b.c,10), d:pick(b.d,10), e:pick(b.e,10), f:pick(b.f,10),
    g:pick(b.g,10), h:pick(b.h,10), i:b.i[Math.floor(Math.random()*b.i.length)]
  };
}

function validateLevelBank(lb){
  if(!lb) return false;
  const req=['a','b','c','d','e','f','g','h','i'];
  return req.every(k=>Array.isArray(lb[k]) && lb[k].length>=10);
}

async function loadQuestionBankFromJsonBin(){
  try{
    const res=await fetch(`${API}/b/${BIN_ID}/latest`,{headers:{'X-Master-Key':MKEY,'X-Bin-Meta':'false'},cache:'no-store'});
    if(!res.ok) return null;
    const data=await res.json();
    const qb = data.questionBank;
    if(!qb || !validateLevelBank(qb.zenv) || !validateLevelBank(qb.zenz) || !validateLevelBank(qb.zene)) return null;
    return data;
  }catch(e){ return null; }
}

function sgDate(){ return new Intl.DateTimeFormat('en-CA',{timeZone:'Asia/Singapore'}).format(new Date()); }

async function startTest(){
  const raw=document.getElementById('studentName').value.trim();
  const p=profileFromName(raw);
  if(!p){document.getElementById('gateErr').textContent='Use one of these names: ZenV, ZenZ, ZenE';return;}
  document.getElementById('gateErr').textContent='';
  studentName=raw; currentProfile=p; startTime=new Date();

  const remoteData = await loadQuestionBankFromJsonBin();
  const remoteQB = remoteData ? remoteData.questionBank : null;
  const today = sgDate();
  const assigned = remoteData && remoteData.dailyAssignments && remoteData.dailyAssignments[today] ? remoteData.dailyAssignments[today][p.key] : null;

  const localSaved = loadLocal();
  const sameStudentLocal = localSaved && localSaved.name && norm(localSaved.name)===norm(studentName) && localSaved.studentGrade===p.grade;
  const localSet = sameStudentLocal && localSaved.generatedQuestions ? localSaved.generatedQuestions : null;

  let serverSet = null;
  if (remoteData && Array.isArray(remoteData.submissions)) {
    const mine = remoteData.submissions.find(s => norm(s.name||'')===norm(studentName) && (s.studentGrade||'')===p.grade);
    if (mine && mine.generatedQuestions) serverSet = mine.generatedQuestions;
  }

  questionSet = localSet || serverSet || assigned || generateSet(p.key, remoteQB || BANK);

  document.getElementById('gate').style.display='none';
  document.getElementById('main').style.display='block';
  document.getElementById('studentTag').textContent='Student: '+studentName;
  const srcTag = localSet ? 'Restored same question set (local)' : (serverSet ? 'Restored same question set (server)' : (assigned ? 'Assigned set (no repeat)' : (remoteQB ? 'Bank: JSONBin' : 'Bank: Local fallback')));
  document.getElementById('levelTag').textContent='Level: '+p.level + ' · ' + srcTag;
  renderAllSections();
  restoreLocal();
  fetchAndRestore();
  updateProgress();
}

}

function pickMcq(q,idx){
  answers['f'+q]=idx;
  for(let j=0;j<4;j++)document.getElementById(`f${q}_${j}`).classList.remove('sel');
  document.getElementById(`f${q}_${idx}`).classList.add('sel');
  updateProgress();
  saveDraftLocalOnly();
}

function setFb(id,msg){const el=document.getElementById(id);if(el)el.textContent=msg||'';}
function overlapRatio(a,b){
  const A=new Set((a||'').split(/\s+/).map(w=>w.toLowerCase().replace(/[^a-z']/g,'')).filter(Boolean));
  const B=new Set((b||'').split(/\s+/).map(w=>w.toLowerCase().replace(/[^a-z']/g,'')).filter(Boolean));
  if(!A.size||!B.size) return 0;
  let inter=0; A.forEach(w=>{if(B.has(w))inter++;});
  return inter/Math.max(A.size,B.size);
}
function duplicateFlagsForPart(part){
  const flags={};
  for(let i=1;i<=10;i++){
    const a=(document.getElementById(part+i)?.value||'').trim();
    if(!a) continue;
    for(let j=i+1;j<=10;j++){
      const b=(document.getElementById(part+j)?.value||'').trim();
      if(!b) continue;
      if(norm(a)===norm(b) || overlapRatio(a,b)>=0.92){flags[i]=true;flags[j]=true;}
    }
  }
  return flags;
}

function hintFor(part, qObj, value){
  const v=(value||'').trim();
  if(!v) return 'Hint: attempt this question first before submitting.';
  if(part==='a') return 'Hint: check tense/time clue words and subject-verb agreement.';
  if(part==='b') return 'Hint: convert the root word to the correct form (noun/verb/adjective/adverb).';
  if(part==='c') return 'Hint: check subject-verb agreement, tense, and modal verb structure.';
  if(part==='d') return 'Hint: keep meaning same, but follow the target grammar pattern exactly.';
  if(part==='e') return 'Hint: arrange words in clear S-V-O order and add missing grammar words.';
  if(part==='f') return 'Hint: pick the option that best matches sentence meaning and collocation.';
  return 'Hint: revise grammar and clarity.';
}

function smartScoreSentence(text,level='sec'){
  const t=(text||'').trim();
  if(!t) return {score:0,fb:'No answer provided.'};
  const words=t.split(/\s+/).filter(Boolean);
  const wc=words.length;
  const unique=new Set(words.map(w=>w.toLowerCase().replace(/[^a-z']/g,''))).size;
  let score=0,notes=[];
  const min=level==='p6'?8:10;
  if(wc>=min){score+=3;notes.push(`✔ length good (${wc} words)`);} else notes.push(`• add detail (now ${wc} words)`);
  if(/[A-Z]/.test(t[0]||'') && /[.!?]$/.test(t)){score+=2;notes.push('✔ proper sentence form');} else notes.push('• start with capital and end punctuation');
  if(/\b(because|although|while|which|that|when|since|however|therefore|moreover|despite)\b/i.test(t)){score+=3;notes.push('✔ good connector / complex structure');} else notes.push('• use a connector (because/although/however...)');
  const ratio=wc?unique/wc:0; if(ratio>=0.55){score+=2;notes.push('✔ varied vocabulary');} else notes.push('• improve word variety');
  return {score:Math.min(10,score),fb:notes.join('\n')};
}

function smartScoreParagraph(text){
  const t=(text||'').trim();
  if(!t) return {score:0,fb:'No paragraph provided.'};
  const words=t.split(/\s+/).filter(Boolean);
  const wc=words.length;
  const sentenceList=t.split(/[.!?]+/).map(s=>s.trim()).filter(Boolean);
  const sentences=sentenceList.length;
  const unique=new Set(words.map(w=>w.toLowerCase().replace(/[^a-z']/g,''))).size;
  let score=0,notes=[];
  if(wc>=200 && wc<=250){score+=4;notes.push(`✔ word count in target (${wc})`);} else notes.push(`• target 200–250 words (now ${wc})`);
  if(sentences>=8){score+=2;notes.push(`✔ sentence count good (${sentences})`);} else notes.push(`• add more complete sentences (now ${sentences})`);
  if(/\b(firstly|however|therefore|moreover|for example|in conclusion|on the other hand|because)\b/i.test(t)){score+=2;notes.push('✔ uses linking/organisation words');} else notes.push('• include linking words for flow');
  if((unique/(wc||1))>=0.45){score+=2;notes.push('✔ vocabulary variety is solid');} else notes.push('• vary vocabulary more');

  const seen=new Set();
  let repeats=0;
  sentenceList.forEach(s=>{const n=norm(s); if(!n) return; if(seen.has(n)) repeats++; else seen.add(n);});
  if(repeats>0){score=Math.max(0,score-2); notes.push('• avoid repeating the same sentence in the paragraph');}

  return {score:Math.min(10,score),fb:notes.join('\n')};
}

function markInput(id,ok){const el=document.getElementById(id);if(!el)return;el.classList.remove('good','bad');el.classList.add(ok?'good':'bad');}

function submitPart(part){
  if(part==='a'||part==='b'||part==='c'||part==='d'||part==='e'){
    let score=0;
    questionSet[part].forEach((q,i)=>{
      const id=part+(i+1),v=(document.getElementById(id).value||'').trim();
      answers[id]=v;
      const ok=norm(v)===norm(q.a);
      markInput(id,ok);
      setFb(part+'fb'+(i+1), ok ? '✔ Correct.' : hintFor(part,q,v));
      if(ok) score++;
    });
    sectionScores[part]=score;
  }
  if(part==='f'){
    let score=0;
    questionSet.f.forEach((q,i)=>{
      const qn=i+1, k='f'+qn, sel=answers[k];
      if(sel===q.ans) score++;
      for(let j=0;j<4;j++){
        const e=document.getElementById(`f${qn}_${j}`);
        e.classList.remove('right','wrong');
        if(sel!==undefined){ if(j===q.ans)e.classList.add('right'); else if(j===sel)e.classList.add('wrong'); }
      }
      setFb('ffb'+qn, sel===undefined ? 'Hint: choose one option first.' : (sel===q.ans ? '✔ Correct.' : hintFor('f',q,'x')));
    });
    sectionScores.f=score;
  }
  if(part==='g'||part==='h'){
    let total=0;
    const lvl=currentProfile.grade==='P6'?'p6':'sec';
    const dups=duplicateFlagsForPart(part);
    for(let i=1;i<=10;i++){
      const id=part+i,v=(document.getElementById(id).value||'').trim();answers[id]=v;
      const res=smartScoreSentence(v,lvl);
      let s=res.score;
      let extra='';
      if(dups[i]){ s=Math.max(0,s-3); extra='\n• Avoid copying the same sentence for multiple questions.'; }
      total+=s;
      document.getElementById(part+'fb'+i).textContent=`Score: ${s}/10\n${res.fb}${extra}`;
      markInput(id,s>=6);
    }
    sectionScores[part]=Math.round(total/10);
  }
  if(part==='i'){
    const v=(document.getElementById('i1').value||'').trim();answers.i1=v;
    const res=smartScoreParagraph(v);
    sectionScores.i=res.score;
    document.getElementById('ifb1').textContent=`Score: ${res.score}/10\n${res.fb}`;
    markInput('i1',res.score>=6);
  }
  sectionChecked[part]=true;
  updateScoreUI();
  autoSave(part);
}

function updateScoreUI(){
  const af=['a','b','c','d','e','f'].reduce((s,p)=>s+(sectionScores[p]||0),0);
  document.getElementById('totalScore').textContent=af;
}

function updateParagraphCount(){
  const v=(document.getElementById('i1').value||'').trim();
  const wc=v?v.split(/\s+/).filter(Boolean).length:0;
  document.getElementById('iWord').textContent=`Words: ${wc} / Target 200–250`;
}

function updateProgress(){
  let count=0;
  ['a','b','c','d','e','g','h'].forEach(p=>{for(let i=1;i<=10;i++){const v=(document.getElementById(p+i)?.value||'').trim();if(v)count++;}});
  for(let i=1;i<=10;i++) if(answers['f'+i]!==undefined) count++;
  if((document.getElementById('i1')?.value||'').trim()) count++;
  document.getElementById('answeredTag').textContent=`Answered: ${count}/71`;
}

function buildSubmission(){
  const afScore=['a','b','c','d','e','f'].reduce((s,p)=>s+(sectionScores[p]||0),0);
  const pct=Math.round((afScore/60)*100);
  const dur=startTime?Math.max(1,Math.round((Date.now()-startTime.getTime())/60000))+" min":"N/A";
  const allAnswers=collectCurrentAnswers();

  return {
    name:studentName,
    submittedAt:new Date().toLocaleString('en-MY',{dateStyle:'medium',timeStyle:'short'}),
    duration:dur,
    score:afScore,
    pct,
    sectionScores:{a:sectionScores.a,b:sectionScores.b,c:sectionScores.c,d:sectionScores.d,e:sectionScores.e,f:sectionScores.f,g:sectionScores.g,h:sectionScores.h,i:sectionScores.i},
    answers:allAnswers,
    generatedQuestions:questionSet,
    testTheme:'Media & Communication',
    studentLevel:currentProfile.level,
    studentGrade:currentProfile.grade
  };
}

function saveLocal(data){try{localStorage.setItem(SKEY+"_"+currentProfile.key,JSON.stringify(data));}catch(e){}}
function loadLocal(){try{const d=localStorage.getItem(SKEY+"_"+currentProfile.key);return d?JSON.parse(d):null;}catch(e){return null;}}

function saveDraftLocalOnly(){
  if(!currentProfile) return;
  const draft={
    name:studentName,
    studentGrade:currentProfile.grade,
    answers:collectCurrentAnswers(),
    sectionScores,
    generatedQuestions:questionSet
  };
  saveLocal(draft);
}

function collectCurrentAnswers(){
  const allAnswers={};
  ['a','b','c','d','e','g','h'].forEach(p=>{for(let i=1;i<=10;i++){allAnswers[p+i]=(document.getElementById(p+i)?.value||'').trim();}});
  for(let i=1;i<=10;i++) allAnswers['f'+i]=answers['f'+i]!==undefined?answers['f'+i]:"";
  allAnswers.i1=(document.getElementById('i1')?.value||'').trim();
  return allAnswers;
}

function restoreLocal(){
  const s=loadLocal(); if(!s||!s.answers) return;
  fillAnswers(s.answers); if(s.sectionScores) sectionScores={...sectionScores,...s.sectionScores};
  updateScoreUI();
}

function fillAnswers(a){
  if(!a) return;
  ['a','b','c','d','e','g','h'].forEach(p=>{for(let i=1;i<=10;i++){if(a[p+i]) document.getElementById(p+i).value=a[p+i];}});
  for(let i=1;i<=10;i++){const v=a['f'+i];if(v!==""&&v!==undefined){answers['f'+i]=Number(v);pickMcq(i,Number(v));}}
  if(a.i1) document.getElementById('i1').value=a.i1;
  updateParagraphCount();updateProgress();
}

async function pushToServer(data){
  for(let attempt=1;attempt<=3;attempt++){
    try{
      const getRes=await fetch(`${API}/b/${BIN_ID}/latest`,{headers:{'X-Master-Key':MKEY,'X-Bin-Meta':'false'},cache:'no-store'});
      if(!getRes.ok) throw new Error('GET '+getRes.status);
      const existing=await getRes.json();
      const subs=Array.isArray(existing.submissions)?existing.submissions:[];
      const idx=subs.findIndex(s=>s.name===data.name&&s.studentGrade===data.studentGrade&&s.testTheme===data.testTheme);
      if(idx>=0) subs[idx]=data; else subs.push(data);
      const putRes=await fetch(`${API}/b/${BIN_ID}`,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':MKEY},body:JSON.stringify({submissions:subs})});
      if(!putRes.ok) throw new Error('PUT '+putRes.status);
      return true;
    }catch(e){if(attempt<3) await new Promise(r=>setTimeout(r,900*attempt));}
  }
  return false;
}

async function autoSave(part){
  document.getElementById('status-'+part).textContent='Saving...';
  const data=buildSubmission();
  saveLocal(data);
  const ok=await pushToServer(data);
  document.getElementById('status-'+part).textContent=ok?'Saved ✓':'Saved locally (server retry later)';
  document.getElementById('savedTag').textContent=ok?`Last saved: Part ${part.toUpperCase()} ✓`:'Saved locally only';
}

async function fetchAndRestore(){
  try{
    const res=await fetch(`${API}/b/${BIN_ID}/latest`,{headers:{'X-Master-Key':MKEY,'X-Bin-Meta':'false'},cache:'no-store'});
    if(!res.ok) return;
    const data=await res.json();
    const subs=Array.isArray(data.submissions)?data.submissions:[];
    const mine=subs.find(s=>(s.name||'').toLowerCase().replace(/\s+/g,'')===studentName.toLowerCase().replace(/\s+/g,'')&&(s.studentGrade||'')===currentProfile.grade);
    if(mine&&mine.answers){
      saveLocal(mine);
      fillAnswers(mine.answers);
      if(mine.sectionScores){sectionScores={...sectionScores,...mine.sectionScores};updateScoreUI();}
    }
  }catch(e){}
}

window.onload=()=>{
  const qName=new URLSearchParams(location.search).get('name');
  if(qName){document.getElementById('studentName').value=qName;startTest();}
};
</script>
