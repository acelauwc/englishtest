<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Dashboard — Health & Medicine</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0d0f;--surf:#0f1318;--card:#161b23;--border:#222a35;
  --accent:#4ade80;--a2:#f59e0b;--a3:#60a5fa;
  --text:#e2e8f0;--muted:#64748b;
  --ok:#4ade80;--err:#f87171;--warn:#fbbf24;
  --mono:'Space Mono',monospace;--sans:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(74,222,128,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(74,222,128,.025) 1px,transparent 1px);background-size:44px 44px;pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;max-width:1080px;margin:0 auto;padding:28px 16px 80px}

/* SETUP */

/* HEADER */
.hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;padding-bottom:22px;border-bottom:1px solid var(--border);margin-bottom:24px;flex-wrap:wrap}
.badge{display:inline-block;font-family:var(--mono);font-size:10px;letter-spacing:3px;border:1px solid var(--a2);color:var(--a2);padding:3px 12px;border-radius:2px;margin-bottom:10px;text-transform:uppercase}
.hdr h1{font-family:var(--mono);font-size:clamp(16px,3vw,26px);font-weight:700;color:#fff}
.hdr h1 span{color:var(--accent)}
.hdr-meta{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:4px}
.hdr-btns{display:flex;gap:10px;flex-wrap:wrap;align-items:center}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;border-top:2px solid var(--accent)}
.stat.s2{border-top-color:var(--a2)}.stat.s3{border-top-color:var(--ok)}.stat.s4{border-top-color:var(--warn)}
.stat .v{font-family:var(--mono);font-size:26px;font-weight:700;color:var(--text)}
.stat .l{font-size:10px;color:var(--muted);margin-top:5px;text-transform:uppercase;letter-spacing:1px;font-family:var(--mono)}

/* TOOLBAR */
.toolbar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.toolbar input{background:var(--card);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--sans);font-size:13px;padding:8px 12px;outline:none;flex:1;min-width:180px;max-width:260px}
.toolbar input:focus{border-color:var(--a2)}
.toolbar select{background:var(--card);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--mono);font-size:11px;padding:8px 12px;outline:none;cursor:pointer}
.btn{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:1px;padding:8px 16px;border:none;border-radius:6px;cursor:pointer;text-transform:uppercase}
.btn-refresh{background:transparent;color:var(--accent);border:1px solid var(--accent)}
.btn-csv{background:var(--accent);color:#000}
.btn-reset{background:transparent;color:var(--err);border:1px solid rgba(248,113,113,.3);font-size:10px}

/* TABLE */
.tbl-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.tbl-head{display:grid;grid-template-columns:2fr 1.1fr 0.9fr 0.6fr 0.6fr 0.6fr 0.6fr 0.6fr 0.6fr 0.7fr;background:var(--surf);border-bottom:1px solid var(--border)}
.th{padding:10px 12px;font-family:var(--mono);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.tbl-row{display:grid;grid-template-columns:2fr 1.1fr 0.9fr 0.6fr 0.6fr 0.6fr 0.6fr 0.6fr 0.6fr 0.7fr;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.tbl-row:last-child{border-bottom:none}
.tbl-row:hover{background:rgba(74,222,128,.04)}
.td{padding:12px 12px;display:flex;align-items:center;font-size:12px}
.td.name{gap:10px;font-weight:600;font-size:13px;color:#fff}
.avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--a2),var(--accent));display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;font-weight:700;color:#000;flex-shrink:0}
.td.score-td{flex-direction:column;align-items:flex-start;gap:3px}
.mini-bar{width:100%;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.mini-fill{height:100%;border-radius:2px}
.sec-score{font-family:var(--mono);font-size:12px;font-weight:700}
.btn-view{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:1px;padding:4px 10px;background:transparent;border:1px solid var(--a3);color:var(--a3);border-radius:4px;cursor:pointer;text-transform:uppercase}
.empty{text-align:center;padding:60px 20px}
.empty .icon{font-size:40px;margin-bottom:14px}
.empty h3{font-family:var(--mono);font-size:15px;color:var(--muted);margin-bottom:6px}
.empty p{font-size:13px;color:var(--muted);line-height:1.65}

/* DETAIL VIEW */
#detailView{display:none}
.back-btn{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:1px;padding:8px 16px;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:6px;cursor:pointer;text-transform:uppercase;margin-bottom:22px}
.det-hdr{margin-bottom:22px}
.det-hdr h2{font-family:var(--mono);font-size:20px;color:#fff;margin-bottom:4px}
.det-hdr p{font-size:12px;color:var(--muted);font-family:var(--mono)}
.ov-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
.ov-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;text-align:center}
.ov-card .v{font-family:var(--mono);font-size:22px;font-weight:700}
.ov-card .l{font-size:10px;color:var(--muted);font-family:var(--mono);margin-top:3px}
.sec-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px}
.sec-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 14px}
.sec-card .sl{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.sec-card .sv{font-family:var(--mono);font-size:18px;font-weight:700}
.sec-card .sb{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:6px}
.sec-card .sf{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--a2),var(--accent))}
.ans-sec{margin-bottom:24px}
.ans-sec h4{font-family:var(--mono);font-size:10px;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:10px}
.ans-sec h4::after{content:'';flex:1;height:1px;background:var(--border)}
.ans-row{display:grid;grid-template-columns:44px 1fr 70px;gap:8px;padding:10px 12px;border-radius:7px;margin-bottom:7px;font-size:12px;align-items:start}
.ans-row.r-ok{background:rgba(74,222,128,.04);border:1px solid rgba(74,222,128,.15)}
.ans-row.r-bad{background:rgba(248,113,113,.04);border:1px solid rgba(248,113,113,.15)}
.ans-row.r-open{background:rgba(96,165,250,.04);border:1px solid rgba(96,165,250,.15)}
.ans-row.r-blank{background:rgba(255,255,255,.02);border:1px solid var(--border)}
.ans-qn{font-family:var(--mono);font-size:10px;color:var(--muted);padding-top:2px}
.ans-body .given{color:var(--text);line-height:1.55;word-break:break-word}
.ans-body .model{color:var(--a2);font-size:11px;margin-top:5px;line-height:1.5}
.ans-body .rule-txt{color:var(--a3);font-size:11px;margin-top:4px;line-height:1.5}
.ans-status{font-family:var(--mono);font-size:12px;font-weight:700;text-align:right;padding-top:2px}
.para-box{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;font-size:13px;line-height:1.85;color:var(--text);white-space:pre-wrap;margin-bottom:8px}

@media(max-width:700px){
  .stats{grid-template-columns:1fr 1fr}
  .tbl-head,.tbl-row{grid-template-columns:2fr 0.9fr 0.7fr 0.7fr}
  .th:nth-child(n+5),.td:nth-child(n+5):not(:last-child){display:none}
  .ov-grid{grid-template-columns:1fr 1fr 1fr}
  .sec-grid{grid-template-columns:1fr 1fr}
  }
</style>
</head>
<body>
<div class="wrap">

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="hdr">
    <div>
      <div class="badge">Teacher Dashboard</div>
      <h1>Health &amp; Medicine — <span>Results</span></h1>
      <div class="hdr-meta" id="metaTxt">Loading...</div>
    </div>
    <div class="hdr-btns">
      <button class="btn btn-refresh" onclick="loadData()">↻ Refresh</button>
      <button class="btn btn-csv" onclick="exportCSV()">⬇ CSV</button>
      <button class="btn btn-reset" onclick="confirmReset()">🗑 Clear All</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="v" id="stTotal">0</div><div class="l">Submissions</div></div>
    <div class="stat s2"><div class="v" id="stAvg">—</div><div class="l">Class Average</div></div>
    <div class="stat s3"><div class="v" id="stHigh">—</div><div class="l">Highest Score</div></div>
    <div class="stat s4"><div class="v" id="stPass">—</div><div class="l">Pass Rate ≥60%</div></div>
  </div>

  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="🔍 Search by name..." oninput="renderTable()">
    <select id="sortSel" onchange="renderTable()">
      <option value="time">Latest First</option>
      <option value="score-desc">Highest Score</option>
      <option value="score-asc">Lowest Score</option>
      <option value="name">Name A–Z</option>
    </select>
  </div>

  <div class="tbl-wrap" id="tblWrap"></div>
</div>

<!-- DETAIL VIEW -->
<div id="detailView">
  <button class="back-btn" onclick="closeDetail()">← Back to Dashboard</button>
  <div id="detailContent"></div>
</div>

</div>

<script>
const BIN_ID='69babf10b7ec241ddc7d652f';
const MASTER_KEY='$2a$10$GeOyXKViWuf6OsSoiA9eT.bifbFDXJ/AsilT9KSjMz.2Ibg5mPDGS';
const API='https://api.jsonbin.io/v3';
let allSubs=[];

const ANSWERS={
  a:["conducted","has treated","had stabilised","have been searching","will launch","was performing","will have developed","has been monitoring","was administering","improve"],
  b:["approval","precisely","detection","harmful","remarkably","importance","immediately","connection","effective","accessibility"],
  c:["The number of patients suffering from diabetes has risen sharply in recent years.","Despite the side effects, the patient continued taking the prescribed medication.","The patient should have informed the doctor about his allergies before surgery.","Neither the doctor nor the nurses were available when the emergency occurred.","The hospital, along with several clinics, was forced to close during the outbreak.","Researchers have been studying the effects of sleep deprivation for many years.","The clinic lacks proper medical equipment to handle complex surgeries.","If the doctors had diagnosed the illness earlier, the patient could have survived.","The medical report, which has been reviewed by three specialists, confirmed the diagnosis.","More research on the long-term effects of this medication is needed urgently."],
  d:["A breakthrough treatment for the disease was discovered by scientists last year.","She is a dedicated nurse who has worked in intensive care for ten years.","The outbreak was so severe that thousands of people were hospitalised.","The doctor said that I had to take the medication twice a day.","Such was the devastation of the epidemic that it overwhelmed the entire healthcare system.","Despite the pain of the treatment, the patient completed the full course.","The nurse asked whether I had taken my medication that day.","All medical staff must wash their hands before treating patients.","Having completed the diagnosis, the doctors informed the patient of the results.","Millions of people across the continent have been infected by the virus."],
  e:["Mental health is one of the greatest challenges of our time.","Despite many medical advances, many diseases remain incurable.","The doctors have pledged to improve the quality of healthcare in rural areas.","Infectious disease can only be controlled through international cooperation.","The global pandemic has claimed thousands of lives.","It is essential that all hospitals are adequately staffed.","The organisation praised the medical workers for their frontline dedication.","The patient had received proper treatment before the condition worsened.","The root causes of poor health, poverty and inequality, are being addressed.","No society will thrive without access to quality healthcare."],
  f:["A","A","B","C","B","C","B","C","D","C"]
};

const MCQ_OPTS=[
  ["administration","admiration","admonition","adaptation"],
  ["precision","decision","provision","division"],
  ["rite","right","might","plight"],
  ["ambiguous","contentious","unanimous","unilateral"],
  ["surplus","scarcity","clarity","disparity"],
  ["diminish","abolish","abandon","admonish"],
  ["aggravate","alleviate","alienate","allocate"],
  ["redundant","divisive","persuasive","ambivalent"],
  ["notified","justified","ratified","approved"],
  ["reckless","restless","relentless","helpless"]
];

const MCQ_RULES=[
  "ADMINISTRATION = the process of giving or applying medication. Not 'admiration' (respect).",
  "PRECISION = the quality of being exact and accurate. Key medical/scientific vocabulary.",
  "RIGHT (noun) = a moral or legal entitlement. 'Rite' = a ceremony.",
  "UNANIMOUS = agreed upon by all. 'Contentious' = causing disagreement.",
  "SCARCITY = a severe shortage. 'Surplus' = excess; 'disparity' = inequality.",
  "ABANDON = to give up completely. 'Abolish' = to formally end a system.",
  "ALLEVIATE = to make a problem less severe. 'Aggravate' = worsen.",
  "PERSUASIVE = able to persuade or convince. 'Redundant' = unnecessary.",
  "APPROVED = officially agreed to be safe or acceptable. Standard for medical treatments.",
  "RELENTLESS = constant and determined, never stopping. 'Reckless' = careless."
];

function norm(s){ return (s||'').toLowerCase().replace(/[^a-z0-9 ',]/g,'').replace(/\s+/g,' ').trim(); }
function sc(pct){ return pct>=80?'var(--ok)':pct>=60?'var(--warn)':'var(--err)'; }
function initials(name){ return (name||'?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase(); }

// ─── CONFIG ──────────────────────────────────────────────
window.addEventListener('load',()=>{
  loadData();
});

// ─── LOAD DATA ───────────────────────────────────────────
async function loadData(){
  document.getElementById('metaTxt').textContent='Refreshing...';
  try{
    const res=await fetch(`${API}/b/${BIN_ID}/latest`,{headers:{'X-Master-Key':MASTER_KEY,'X-Bin-Meta':false}});
    const data=await res.json();
    allSubs=Array.isArray(data.submissions)?data.submissions:[];
    renderStats(); renderTable();
    const now=new Date().toLocaleTimeString('en-MY',{hour:'2-digit',minute:'2-digit'});
    const finalCount=allSubs.filter(s=>!s.isDraft).length;
    const draftCount=allSubs.filter(s=>s.isDraft).length;
    document.getElementById('metaTxt').textContent=`Refreshed ${now} · ${finalCount} submission${finalCount!==1?'s':''}${draftCount>0?' · '+draftCount+' in progress':''}`;

  }catch(e){
    document.getElementById('metaTxt').textContent='Error loading. Check your API key and Bin ID.';
  }
}

// ─── STATS ───────────────────────────────────────────────
function renderStats(){
  const finalSubs=allSubs.filter(s=>!s.isDraft);
  const n=finalSubs.length;
  document.getElementById('stTotal').textContent=n;
  if(!n){['stAvg','stHigh','stPass'].forEach(id=>document.getElementById(id).textContent='—');return;}
  const scores=finalSubs.map(s=>s.score||0);
  document.getElementById('stAvg').textContent=Math.round(scores.reduce((a,b)=>a+b,0)/n)+'/60';
  document.getElementById('stHigh').textContent=Math.max(...scores)+'/60';
  document.getElementById('stPass').textContent=Math.round((finalSubs.filter(s=>(s.pct||0)>=60).length/n)*100)+'%';
}

// ─── TABLE ───────────────────────────────────────────────
function renderTable(){
  const q=(document.getElementById('searchInput').value||'').toLowerCase();
  const sort=document.getElementById('sortSel').value;
  let list=allSubs.filter(s=>!s.isDraft&&(s.name||'').toLowerCase().includes(q));
  if(sort==='score-desc') list.sort((a,b)=>(b.score||0)-(a.score||0));
  else if(sort==='score-asc') list.sort((a,b)=>(a.score||0)-(b.score||0));
  else if(sort==='name') list.sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  const wrap=document.getElementById('tblWrap');
  if(!list.length){
    wrap.innerHTML=`<div class="empty"><div class="icon">${allSubs.length?'🔍':'📭'}</div><h3>${allSubs.length?'No matching students':'No submissions yet'}</h3><p>${allSubs.length?'Try a different search term.':'Students need to open student_test.html and submit.'}</p></div>`;
    return;
  }
  let html=`<div class="tbl-head"><div class="th">Student</div><div class="th">Submitted</div><div class="th">Total</div><div class="th">A</div><div class="th">B</div><div class="th">C</div><div class="th">D</div><div class="th">E</div><div class="th">F</div><div class="th"></div></div>`;
  list.forEach((s,i)=>{
    const sc2=s.sectionScores||{}, pct=s.pct||0, init=initials(s.name);
    const si=allSubs.indexOf(s);
    html+=`<div class="tbl-row" onclick="showDetail(${si})">
      <div class="td name"><div class="avatar">${init}</div>${s.name||'Unknown'}</div>
      <div class="td" style="font-size:11px;color:var(--muted);font-family:var(--mono)">${(s.submittedAt||'').replace(', ',' ')}</div>
      <div class="td score-td">
        <span style="font-family:var(--mono);font-size:13px;font-weight:700;color:${sc(pct)}">${s.score||0}/60 <span style="font-size:10px;opacity:.6">(${pct}%)</span></span>
        <div class="mini-bar"><div class="mini-fill" style="width:${pct}%;background:${sc(pct)}"></div></div>
      </div>
      ${['a','b','c','d','e','f'].map(p=>`<div class="td"><span class="sec-score" style="color:${sc((sc2[p]||0)*10)}">${sc2[p]||0}/10</span></div>`).join('')}
      <div class="td"><button class="btn-view" onclick="event.stopPropagation();showDetail(${si})">View →</button></div>
    </div>`;
  });
  wrap.innerHTML=html;
}

// ─── DETAIL ──────────────────────────────────────────────
function showDetail(idx){
  const s=allSubs[idx]; if(!s) return;
  const sc2=s.sectionScores||{}, ans=s.answers||{}, pct=s.pct||0;
  document.getElementById('dashboard').style.display='none';
  document.getElementById('detailView').style.display='block';

  const AnsRowsHTML=(pfx,partAnswers,isOpen)=>{
    return Array.from({length:10},(_,i)=>{
      const k=pfx+(i+1), given=ans[k]||'', model=partAnswers?partAnswers[i]:'';
      const ok=model&&norm(given)===norm(model);
      const rowCls=!given?'r-blank':isOpen?'r-open':ok?'r-ok':'r-bad';
      let inner=`<div class="ans-qn">Q${i+1}</div><div class="ans-body"><div class="given">${given||'<em style="color:var(--muted)">No answer</em>'}</div>`;
      if(!isOpen&&model&&!ok&&given){
        inner+=`<div class="model">✎ Model: ${model}</div>`;
        const partData={a:ANSWERS.a,b:ANSWERS.b,c:ANSWERS.c,d:ANSWERS.d,e:ANSWERS.e};
        // note: rule shown from answer key comments
      }
      inner+=`</div><div class="ans-status" style="color:${isOpen?'var(--a3)':!given?'var(--muted)':ok?'var(--ok)':'var(--err)'}">${isOpen?'—':!given?'—':ok?'✓':'✗'}</div>`;
      return `<div class="ans-row ${rowCls}">${inner}</div>`;
    }).join('');
  };

  const MCQRowsHTML=()=>{
    return Array.from({length:10},(_,i)=>{
      const k='f'+(i+1), given=ans[k]||'', correct=ANSWERS.f[i];
      const ok=given===correct;
      const letters=['A','B','C','D'];
      const givenWord=given?MCQ_OPTS[i][letters.indexOf(given)]:'';
      const correctWord=MCQ_OPTS[i][letters.indexOf(correct)];
      const rowCls=!given?'r-blank':ok?'r-ok':'r-bad';
      return `<div class="ans-row ${rowCls}">
        <div class="ans-qn">Q${i+1}</div>
        <div class="ans-body">
          <div class="given">${given?`${given}. ${givenWord}`:'<em style="color:var(--muted)">No answer</em>'}</div>
          ${!ok&&given?`<div class="model">✎ ${correct}. ${correctWord}</div><div class="rule-txt">${MCQ_RULES[i]}</div>`:''}
        </div>
        <div class="ans-status" style="color:${!given?'var(--muted)':ok?'var(--ok)':'var(--err)'}">${!given?'—':ok?'✓':'✗'}</div>
      </div>`;
    }).join('');
  };

  document.getElementById('detailContent').innerHTML=`
    <div class="det-hdr">
      <h2>${s.name}</h2>
      <p>Submitted: ${s.submittedAt||'N/A'} &nbsp;·&nbsp; Duration: ${s.duration||'N/A'} &nbsp;·&nbsp; Score: ${s.score||0}/60 (${pct}%)</p>
    </div>
    <div class="ov-grid">
      ${[['Total',`${s.score||0}/60`,sc(pct)],['Percentage',pct+'%',sc(pct)],['Status',pct>=60?'Pass':'Needs Review',pct>=60?'var(--ok)':'var(--err)']].map(([l,v,c])=>`<div class="ov-card"><div class="v" style="color:${c}">${v}</div><div class="l">${l}</div></div>`).join('')}
    </div>
    <div class="sec-grid">
      ${['a','b','c','d','e','f'].map(p=>{const sv=sc2[p]||0,pp=sv*10;return`<div class="sec-card"><div class="sl">Part ${p.toUpperCase()}</div><div class="sv" style="color:${sc(pp)}">${sv}/10</div><div class="sb"><div class="sf" style="width:${pp}%"></div></div></div>`}).join('')}
    </div>
    ${[['a','Part A — Verb Forms',ANSWERS.a],['b','Part B — Word Forms',ANSWERS.b],['c','Part C — Error Correction',ANSWERS.c],['d','Part D — Sentence Transformation',ANSWERS.d],['e','Part E — Sentence Building',ANSWERS.e]].map(([p,t,ma])=>`
      <div class="ans-sec"><h4>${t}</h4>${AnsRowsHTML(p,ma,false)}</div>
    `).join('')}
    <div class="ans-sec"><h4>Part F — Vocabulary MCQ</h4>${MCQRowsHTML()}</div>
    ${[['g','Part G — Sentence Expansion'],['h','Part H — Composition Practice']].map(([p,t])=>`
      <div class="ans-sec"><h4>${t} <span style="font-size:10px;color:var(--a2)">(Teacher-marked)</span></h4>${AnsRowsHTML(p,null,true)}</div>
    `).join('')}
    <div class="ans-sec"><h4>Part I — Paragraph Writing <span style="font-size:10px;color:var(--a2)">(Teacher-marked)</span></h4>
      <div class="para-box">${ans.i1||'No answer provided.'}</div>
      <div style="font-size:11px;color:var(--muted);font-family:var(--mono)">Word count: ${(ans.i1||'').trim().split(/\s+/).filter(w=>w).length}</div>
    </div>
    <button class="back-btn" onclick="closeDetail()">← Back to Dashboard</button>
  `;
  window.scrollTo(0,0);
}

function closeDetail(){
  document.getElementById('detailView').style.display='none';
  document.getElementById('dashboard').style.display='block';
}

// ─── EXPORT CSV ──────────────────────────────────────────
function exportCSV(){
  if(!allSubs.length){alert('No data to export.');return;}
  const rows=[['Name','Submitted','Duration','Score','Pct','A','B','C','D','E','F'].join(','),
    ...allSubs.map(s=>{const sc2=s.sectionScores||{};return[s.name,s.submittedAt,s.duration,s.score,(s.pct||0)+'%',sc2.a,sc2.b,sc2.c,sc2.d,sc2.e,sc2.f].map(v=>`"${v||0}"`).join(',');})
  ].join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([rows],{type:'text/csv'}));a.download='health_results.csv';a.click();
}

// ─── CLEAR ALL ───────────────────────────────────────────
async function confirmReset(){
  if(!confirm('Are you sure you want to delete ALL submissions? This cannot be undone.')) return;
  try{
    await fetch(`${API}/b/${BIN_ID}`,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':MASTER_KEY},body:JSON.stringify({submissions:[]})});
    allSubs=[]; renderStats(); renderTable();
    document.getElementById('metaTxt').textContent='All submissions cleared.';
  }catch(e){ alert('Could not clear. Check your connection.'); }
}

// Auto-refresh every 30s
setInterval(loadData,30000);
</script>
